<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WanderMind — Welcome</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #FFFFFF;
    --ink: #000000;
    --muted: #848A97;
    --accent: #2D39F7;
    --line: #E3E4EA;
    --soft: #F0F1F4;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    font-size: 16px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  .welcome-stage {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Topbar */
  .topbar {
    max-width: 1120px;
    width: 100%;
    margin: 0 auto;
    padding: 32px 56px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .wordmark {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 18px;
    letter-spacing: -0.01em;
    text-decoration: none;
    color: var(--ink);
  }
  .wordmark em { font-style: normal; font-weight: 700; color: var(--accent); }
  .progress { display: flex; gap: 6px; }
  .pdot { width: 24px; height: 3px; background: var(--line); border-radius: 2px; }
  .pdot.on { background: var(--ink); }
  .pdot.now { background: var(--accent); }

  /* Welcome content */
  .welcome-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 48px 56px 96px;
    gap: 28px;
  }

  @keyframes fade-up {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .welcome-eyebrow,
  .welcome-title,
  .welcome-sub,
  .welcome-cta {
    opacity: 0;
    animation: fade-up 0.7s ease forwards;
  }
  .welcome-eyebrow { animation-delay: 0.1s; }
  .welcome-title   { animation-delay: 0.3s; }
  .welcome-sub     { animation-delay: 0.6s; }
  .welcome-cta     { animation-delay: 0.9s; }

  .welcome-eyebrow {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .welcome-title {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: clamp(48px, 8vw, 96px);
    line-height: 1.0;
    letter-spacing: -0.025em;
    max-width: 920px;
  }
  .welcome-title em { font-style: normal; color: var(--accent); }
  .welcome-sub {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: clamp(18px, 2vw, 22px);
    color: var(--muted);
    max-width: 520px;
    line-height: 1.5;
  }
  .welcome-cta {
    margin-top: 16px;
    display: inline-block;
    padding: 18px 32px;
    background: var(--accent);
    color: var(--bg);
    text-decoration: none;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 15px;
    letter-spacing: 0.04em;
    border-radius: 999px;
    transition: transform 200ms ease;
  }
  .welcome-cta:hover { transform: translateX(4px); }

  @media (prefers-reduced-motion: reduce) {
    .welcome-eyebrow, .welcome-title, .welcome-sub, .welcome-cta {
      opacity: 1;
      animation: none;
    }
  }

  @media (max-width: 720px) {
    .topbar { padding: 24px; }
    .welcome-content { padding: 32px 24px 64px; gap: 20px; }
  }
</style>
</head>
<body>
  <div class="welcome-stage">

    <nav class="topbar">
      <a href="index.html" class="wordmark">Wander<em>mind</em></a>
      <div class="progress" aria-label="Step 1 of 6">
        <span class="pdot now"></span>
        <span class="pdot"></span>
        <span class="pdot"></span>
        <span class="pdot"></span>
        <span class="pdot"></span>
        <span class="pdot"></span>
      </div>
    </nav>

    <div class="welcome-content">
      <p class="welcome-eyebrow">Welcome</p>
      <h1 class="welcome-title">Let's find <em>your</em> way of traveling.</h1>
      <p class="welcome-sub">Six steps, about five minutes. The result is a traveler profile that's yours to keep.</p>
      <a href="onboarding-rhythm.html" class="welcome-cta">Begin →</a>
    </div>

  </div>
</body>
</html>
