<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WanderMind — What makes you say yes?</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  /* BYCo brand tokens — design system swap points */
  :root {
    --bg: #FFFFFF;       /* White */
    --ink: #000000;      /* Black */
    --muted: #848A97;    /* Uni Grey 500 */
    --accent: #2D39F7;   /* Super Blue 500 */
    --line: #E3E4EA;     /* Aluminium / Grey 200 */
    --soft: #F0F1F4;     /* Grey 100 */
    --sun: #FFB200;
    --mint: #00C378;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  /*
    SegmentAlt is the BYCo brand typeface (Regular / Medium / SemiBold / Bold).
    Inter is loaded as a placeholder for prototyping — swap font-family declarations
    to 'SegmentAlt' once the licensed font is installed.
  */
  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    font-size: 16px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    min-height: 100vh;
  }

  .stage {
    max-width: 1120px;
    margin: 0 auto;
    padding: 32px 56px 48px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Top bar */
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-bottom: 64px;
  }
  .wordmark {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 18px;
    letter-spacing: -0.01em;
    text-decoration: none;
    color: var(--ink);
  }
  .wordmark em {
    font-style: normal;
    font-weight: 400;
    color: var(--accent);
  }
  .progress {
    display: flex;
    gap: 6px;
  }
  .pdot {
    width: 24px;
    height: 3px;
    background: var(--line);
    border-radius: 2px;
    transition: background 240ms ease;
  }
  .pdot.on { background: var(--ink); }
  .pdot.now { background: var(--accent); }

  /* Step header */
  .step-header {
    text-align: left;
    max-width: 720px;
    margin-bottom: 56px;
  }
  .step-eyebrow {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 24px;
  }
  .step-question {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: clamp(40px, 6vw, 72px);
    line-height: 1.05;
    letter-spacing: -0.025em;
  }
  .step-question em {
    font-style: normal;
    font-weight: 700;
    color: var(--accent);
  }
  .step-hint {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 18px;
    color: var(--muted);
    margin-top: 24px;
    max-width: 520px;
    line-height: 1.5;
  }

  /* Card grid */
  .cards {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    max-width: 920px;
    flex: 1;
  }
  .card {
    position: relative;
    aspect-ratio: 1 / 1;
    background: var(--soft);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 24px 22px;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: space-between;
    cursor: pointer;
    transition: transform 200ms ease, background 200ms ease, border-color 200ms ease, box-shadow 200ms ease;
    font-family: inherit;
    color: var(--ink);
    text-align: left;
  }
  .card:hover {
    background: var(--bg);
    border-color: var(--ink);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0, 0, 0, 0.06);
  }
  .card-art {
    width: 56px;
    height: 56px;
    color: var(--ink);
    transition: color 200ms ease;
  }
  .card-art svg { width: 100%; height: 100%; display: block; }
  .card-label {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 20px;
    line-height: 1.2;
    color: var(--ink);
    transition: color 200ms ease;
    letter-spacing: -0.01em;
  }
  .card .check {
    position: absolute;
    top: 14px;
    right: 14px;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transform: scale(0.6);
    transition: opacity 200ms ease, transform 200ms ease;
  }
  .card .check svg {
    width: 10px;
    height: 10px;
    color: var(--bg);
  }

  .card.selected {
    background: var(--ink);
    border-color: var(--ink);
  }
  .card.selected .card-art { color: var(--bg); }
  .card.selected .card-label { color: var(--bg); }
  .card.selected .check {
    opacity: 1;
    transform: scale(1);
  }

  /* Footer */
  .step-footer {
    margin-top: 56px;
    padding-top: 32px;
    border-top: 1px solid var(--line);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .back-link {
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    padding: 8px 0;
    text-decoration: none;
    transition: color 200ms ease;
    font-weight: 500;
  }
  .back-link:hover { color: var(--ink); }
  .footer-meta {
    display: flex;
    align-items: center;
    gap: 24px;
  }
  .selected-count {
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 15px;
    color: var(--muted);
    transition: color 200ms ease;
  }
  .selected-count.ready { color: var(--ink); }
  .continue-btn {
    display: inline-block;
    padding: 14px 28px;
    background: var(--accent);
    color: var(--bg);
    border: none;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 14px;
    letter-spacing: 0.04em;
    cursor: pointer;
    border-radius: 999px;
    text-decoration: none;
    transition: transform 200ms ease, opacity 200ms ease;
    opacity: 0.3;
    pointer-events: none;
  }
  .continue-btn.ready {
    opacity: 1;
    pointer-events: auto;
  }
  .continue-btn.ready:hover {
    transform: translateX(4px);
  }

  @media (max-width: 980px) {
    .cards { grid-template-columns: repeat(3, 1fr); }
  }
  @media (max-width: 720px) {
    .stage { padding: 24px 20px 32px; }
    .topbar { padding-bottom: 40px; }
    .step-header { margin-bottom: 40px; }
    .cards { grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .card-label { font-size: 17px; }
    .card-art { width: 44px; height: 44px; }
    .step-footer { margin-top: 40px; flex-direction: column; gap: 20px; align-items: stretch; }
    .footer-meta { justify-content: space-between; }
  }
</style>
</head>
<body>

    <footer class="step-footer">

      <div class="footer-meta">
        <span class="selected-count" id="count">0 selected</span>
        <a href="onboarding-skips.html" class="continue-btn" id="continue" aria-disabled="true">Continue →</a>
      </div>
    </footer>

  </div>

  <script>
    const MIN = 4;
    const cards = document.querySelectorAll('.card');
    const countEl = document.getElementById('count');
    const continueBtn = document.getElementById('continue');

    cards.forEach(card => {
      card.addEventListener('click', () => {
        card.classList.toggle('selected');
        update();
      });
    });

    function update() {
      const count = document.querySelectorAll('.card.selected').length;
      countEl.textContent = count === 1 ? '1 selected' : `${count} selected`;
      const ready = count >= MIN;
      continueBtn.classList.toggle('ready', ready);
      countEl.classList.toggle('ready', ready);
      continueBtn.setAttribute('aria-disabled', String(!ready));
    }
  </script>
</body>
</html>
